name: CI/CD Pipeline for Credpal-service

on:
  push:
    branches: [ main, feature/* ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository_owner }}
  REPO_NAME: ${{ github.event.repository.name }}
  TAG: ${{ github.sha }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - uses: actions/checkout@v4

    - name: Login to GHCR
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Install dependencies
      run: npm ci

    - name: Run tests
      run: npm test
      env:
        CI: true

    # - name: Install dependencies
    #   working-directory: ./src
    #   run: npm install

    # - name: Run tests
    #   working-directory: ./src
    #   run: npm test

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build & push Credpal-service        
      uses: docker/build-push-action@v6
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: |
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ env.REPO_NAME }}/credpal-service:${{ env.TAG }}
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ env.REPO_NAME }}/credpal-service:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

#### THIS DEPLOYMENT STEP IS ONLY FOR MAIN BRANCH, NOT FOR FEATURE BRANCHES ####        

  deploy:
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd Credpal-service
            touch .env
            if grep -q "^TAG=" .env; then
               sed -i "s|^TAG=.*|TAG=${{ env.TAG }}|" .env
            else
               echo "TAG=${{ env.TAG }}" >> .env
            fi

            docker compose pull
            docker compose up -d
            docker image prune -f
